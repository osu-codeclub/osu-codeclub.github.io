project:
  type: website
  preview: 
    navigate: false

website:
  title: "OSU Code Club"
  site-url: https://osu-codeclub.github.io/
  repo-url: https://github.com/osu-codeclub/osu-codeclub.github.io
  repo-actions: [edit, issue]
  favicon: "img/codeclub_favicon_cc.jpg"
  page-navigation: true
  back-to-top-navigation: true
  google-analytics: "G-6C8GZCJTLH"
  navbar:
    logo: "img/codeclub_favicon.png"
    left:
      - href: pages/schedule.qmd
        text: Upcoming
      - href: pages/previous.qmd
        text: Previous
      - text: Get Started
        menu:
          - text: "Sign up!"
            href: https://forms.gle/eYkMvmJShrcANUrt5
          - text: "Computer setup for Code Club"
            href: pages/setup.qmd
          - text: "R for beginners (workshop materials)"
            href: https://osu-codeclub.github.io/carpentries-feb-2026/
          - text: Material of an R for beginners workshop (Aug '26)
            href: https://osu-codeclub.github.io/carpentries-aug-2026/            
    right:
      - text: "Related activities"
        href: pages/other.qmd
      - text: "About"
        href: about.qmd
      - icon: rss
        href: index.xml
format:
  html:
    highlight-style: atom-one
    theme: [flatly, theme_mod.scss]
    css: styles.css
    toc: true
    number-sections: true
    number-depth: 3
    grid:
      body-width: 850px

